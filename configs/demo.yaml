paths:
  third_party_dir: third_party
  depth_repo_dir: third_party/Depth-Anything-V2
  depth_checkpoint: models/depth_anything_v2_vitl.pth
  sam3_checkpoint: third_party/sam3/sam3.pt
  input_video: data/input/demo.mp4
  output_dir: outputs
  benchmark_dir: benchmarks

model:
  # vitl 是 Depth-Anything-V2 Large 高精度权重，适合强调单目深度质量。
  depth_encoder: vitl
  depth_input_size: 518
  # SAM 3 通过文本概念提示输出像素级 mask；权重放在 third_party/sam3/sam3.pt。
  # SAM 3 stride 为 14，644 可避免 Ultralytics 把 640 自动调整为 644 的运行时警告。
  sam3_imgsz: 644
  sam3_conf: 0.25
  sam3_half: true
  sam3_classes:
    - road
    - pavement
    - asphalt road
    - sidewalk
    - grass
    - person
    - car
    - traffic cone


projection:
  # 每 stride 个像素采一个点。点云演示不需要每个像素都投影，降采样可以显著降低渲染压力。
  stride: 4
  # 没有真实相机标定时，用水平视场角反推近似内参，足够支撑伪激光雷达演示。
  fov_degrees: 70.0
  # Depth-Anything-V2 默认输出相对/逆深度，这里映射到伪距离范围，报告中按 Pseudo-LiDAR 解释。
  pseudo_min_z: 0.5
  pseudo_max_z: 20.0
  invert_depth: true
  filter_min_z: 0.3
  filter_max_z: 25.0

filtering:
  # 进阶项 B：在 GPU 上做边缘保持邻域统计滤波，减少深度突变带来的点云毛刺。
  enabled: true
  radius: 1
  depth_jump_threshold: 1.2
  min_neighbors: 3

runtime:
  device: cuda
  max_frames: 120
  output_fps: 15
  keyframe_interval: 30
  process_width: 960
  use_sam3: true
  allow_fallback_depth: true
  save_ply_interval: 60

visualization:
  # 进阶项 C：本地桌面演示时可打开 Open3D 实时交互窗口；远程/无显示器环境建议保持 false。
  live_open3d: false

evaluation:
  # 每次 run_demo/benchmark 结束后自动生成自评报告。
  enabled: true

decision:
  # 画面中心区域通常更接近车辆/机器人前进方向，局部规则决策优先关注这一带。
  center_band_ratio: 0.40
  danger_z: 3.0
  warning_z: 6.0

vlm:
  # RTX 4060 Laptop 8GB 显存优先选择 Qwen3-VL-2B-Instruct；4B/8B 建议使用量化版本另行测试。
  backend: local_qwen3_vl
  qwen3_vl_model_id: Qwen/Qwen3-VL-2B-Instruct
  qwen3_vl_local_dir: models/qwen3-vl-2b-instruct
  qwen3_vl_max_memory_gb: 6.0
  qwen3_vl_max_new_tokens: 256
